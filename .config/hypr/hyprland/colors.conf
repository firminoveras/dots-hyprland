# exec = export SLURP_ARGS='-d -c FFDBCEBB -b 6E382144 -s 00000000'

general {
    col.active_border = rgba(FFB3AEdd)
    col.inactive_border = rgba(200E0D00)
}

misc {
    background_color = rgba(200E0DFF)
}

plugin {
    hyprbars {
        # Honestly idk if it works like css, but well, why not
        bar_text_font = Rubik, Geist, AR One Sans, Reddit Sans, Inter, Roboto, Ubuntu, Noto Sans, sans-serif
        bar_height = 30
        bar_padding = 10
        bar_button_padding = 5
        bar_precedence_over_border = true
        bar_part_of_window = true

        bar_color = rgba(200E0DFF)
        col.text = rgba(FEDAD7FF)


        # example buttons (R -> L)
        # hyprbars-button = color, size, on-click
        hyprbars-button = rgb(FEDAD7), 13, 󰖭, hyprctl dispatch killactive
        hyprbars-button = rgb(FEDAD7), 13, 󰖯, hyprctl dispatch fullscreen 1
        hyprbars-button = rgb(FEDAD7), 13, 󰖰, hyprctl dispatch movetoworkspacesilent special
    }
}

windowrulev2 = bordercolor rgba(FFB3AEAA) rgba(FFB3AE77),pinned:1
