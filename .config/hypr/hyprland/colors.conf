# exec = export SLURP_ARGS='-d -c EEE1CFBB -b 4E463944 -s 00000000'

general {
    col.active_border = rgba(D5C4AAff)
    col.inactive_border = rgba(15131100)
}

misc {
    background_color = rgba(151311FF)
}

plugin {
    hyprbars {
        # Honestly idk if it works like css, but well, why not
        bar_text_font = Rubik, Geist, AR One Sans, Reddit Sans, Inter, Roboto, Ubuntu, Noto Sans, sans-serif
        bar_height = 30
        bar_padding = 10
        bar_button_padding = 5
        bar_precedence_over_border = true
        bar_part_of_window = true

        bar_color = rgba(151311FF)
        col.text = rgba(E7E1DDFF)


        # example buttons (R -> L)
        # hyprbars-button = color, size, on-click
        hyprbars-button = rgb(E7E1DD), 13, 󰖭, hyprctl dispatch killactive
        hyprbars-button = rgb(E7E1DD), 13, 󰖯, hyprctl dispatch fullscreen 1
        hyprbars-button = rgb(E7E1DD), 13, 󰖰, hyprctl dispatch movetoworkspacesilent special
    }
}

windowrulev2 = bordercolor rgba(D5C4AAAA) rgba(D5C4AA77),pinned:1
