# exec = export SLURP_ARGS='-d -c FFDCC0BB -b 6A3F1044 -s 00000000'

general {
    col.active_border = rgba(FFB68Fdd)
    col.inactive_border = rgba(200F0700)
}

misc {
    background_color = rgba(200F07FF)
}

plugin {
    hyprbars {
        # Honestly idk if it works like css, but well, why not
        bar_text_font = Rubik, Geist, AR One Sans, Reddit Sans, Inter, Roboto, Ubuntu, Noto Sans, sans-serif
        bar_height = 30
        bar_padding = 10
        bar_button_padding = 5
        bar_precedence_over_border = true
        bar_part_of_window = true

        bar_color = rgba(200F07FF)
        col.text = rgba(FEDCCBFF)


        # example buttons (R -> L)
        # hyprbars-button = color, size, on-click
        hyprbars-button = rgb(FEDCCB), 13, 󰖭, hyprctl dispatch killactive
        hyprbars-button = rgb(FEDCCB), 13, 󰖯, hyprctl dispatch fullscreen 1
        hyprbars-button = rgb(FEDCCB), 13, 󰖰, hyprctl dispatch movetoworkspacesilent special
    }
}

windowrulev2 = bordercolor rgba(FFB68FAA) rgba(FFB68F77),pinned:1
